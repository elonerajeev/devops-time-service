name: CI/CD Pipeline for automatic deployement

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: devops-time-service
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

# 1. BUILD + PUSH DOCKER IMAGE
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u $DOCKER_USERNAME --password-stdin

    - name: Build Docker Image
      run: |
        docker build -t $DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG ./web-app

    - name: Push Docker Image
      run: |
        docker push $DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG



# 2. TERRAFORM INFRASTRUCTURE
  infrastructure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Terraform Init
      run: terraform init
      working-directory: terraform

    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: terraform


# 3. DEPLOY TO EKS
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, infrastructure]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
        --region us-east-1 \
        --name ${{ secrets.EKS_CLUSTER_NAME }}

    - name: Update image in Kubernetes manifest
      run: |
        sed -i 's|image: .*|image: '$DOCKER_USERNAME'/'$IMAGE_NAME':'$IMAGE_TAG'|' microservice.yml

    - name: Deploy to EKS
      run: |
        kubectl apply -f microservice.yml

    - name: Verify Deployment
      run: |
        kubectl get pods