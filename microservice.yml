apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-time-service
  labels:
    app: devops-time-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-time-service
  template:
    metadata:
      labels:
        app: devops-time-service
    spec:
      containers:
        - name: devops-time-service
          image: elonerajeev/devops-time-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: devops-time-service
spec:
  type: ClusterIP
  selector:
    app: devops-time-service
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP